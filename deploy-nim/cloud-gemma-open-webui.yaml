apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-gemma-ui
  namespace: nim-service
  labels:
    app: cloud-gemma-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-gemma-ui
  template:
    metadata:
      labels:
        app: cloud-gemma-ui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:v0.5.20
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        env:
        - name: OPENAI_API_BASE_URLS
          value: "http://gemma-2-2b.nim-service.svc.cluster.local:8000/v1"
        - name: OPENAI_API_KEY
          value: "dummy"
        - name: WEBUI_AUTH
          value: "False"
        - name: ENABLE_OLLAMA_API
          value: "False"
        - name: ENABLE_EVALUATION_ARENA_MODELS
          value: "False"
        volumeMounts:
        - name: webui-volume
          mountPath: /app/backend/data
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: In
                values:
                - auto
      volumes:
      - name: webui-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-gemma-ui
  namespace: nim-service
  labels:
    app: cloud-gemma-ui
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector:
    app: cloud-gemma-ui
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080